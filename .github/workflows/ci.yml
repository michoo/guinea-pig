# Pipeline (CI/CD) example — intentionally risky GitHub Actions workflow for plumber.
# Test fixture only.
name: CI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Unpinned action (should use a commit SHA)
      - uses: actions/checkout@v4
      # Unverified script execution (pipe-to-shell)
      - run: curl -s https://127.0.0.1/install.sh | bash
      # Unpinned third-party action referenced by a moving tag
      - uses: some-org/some-action@main
