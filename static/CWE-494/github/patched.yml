# Remediation for CWE-494: Download of Code Without Integrity Check
# Fix: Download the installer to disk, verify its SHA-256 checksum, and only then execute it (no curl|bash).
name: setup

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Install tool
        env:
          INSTALL_SHA256: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
        run: |
          set -euo pipefail
          curl -sSL -o install.sh https://example.com/install.sh
          echo "${INSTALL_SHA256}  install.sh" | sha256sum -c -
          bash install.sh
