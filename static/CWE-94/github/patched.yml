# Remediation for CWE-94: Improper Control of Generation of Code (Code Injection)
# Fix: Pass the untrusted issue title through env and reference it as a quoted shell variable instead of interpolating it into run.
name: issue-handler

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Echo title
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          echo "New issue: $ISSUE_TITLE"
          grep -q "bug" <<< "$ISSUE_TITLE"
