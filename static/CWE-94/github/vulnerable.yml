# CWE-94: Improper Control of Generation of Code (Code Injection)
# Untrusted issue/PR title is interpolated directly into a shell command, allowing script injection.
name: issue-handler

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Echo title
        run: |
          echo "New issue: ${{ github.event.issue.title }}"
          grep -q "bug" <<< "${{ github.event.issue.title }}"
