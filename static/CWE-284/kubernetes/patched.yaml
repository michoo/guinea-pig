# Remediation for CWE-284: Improper Access Control
# Fix: Remove the Docker socket hostPath mount so the container cannot control the host Docker daemon.
---
apiVersion: v1
kind: Pod
metadata:
  name: test
spec:
  containers:
  - image: k8s.gcr.io/test-webserver
    name: test-container
    volumeMounts:
    - mountPath: /data
      name: test-volume
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
  volumes:
  - name: test-volume
    emptyDir: {}
