# Remediation for CWE-668: Exposure of Resource to Wrong Sphere
# Fix: Remove the host /etc hostPath mount and provide configuration via a dedicated ConfigMap volume.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  app.conf: |
    setting=value
---
apiVersion: v1
kind: Pod
metadata:
  name: test
spec:
  containers:
  - image: k8s.gcr.io/test-webserver
    name: test-container
    volumeMounts:
    - mountPath: /data
      name: test-volume
      readOnly: true
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
  volumes:
  - name: test-volume
    configMap:
      name: app-config
