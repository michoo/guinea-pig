# FALSE POSITIVE — not secrets.
# Resembles: connection-string / password-in-URI rules (user:password@host).
# Why benign: default local-development connection strings pointing at localhost with
# well-known default credentials (postgres/postgres, root/root, guest/guest). These
# ship in docker-compose dev setups and grant access only to a throwaway local service.

[database]
url = postgres://postgres:postgres@localhost:5432/devdb

[cache]
url = redis://:@127.0.0.1:6379/0

[broker]
url = amqp://guest:guest@localhost:5672/

[mongo]
url = mongodb://root:root@localhost:27017/test?authSource=admin
