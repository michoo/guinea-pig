# FALSE POSITIVE — not a secret.
# Resembles: generic-api-key / hex token rules (40-char hex strings).
# Why benign: these are git commit SHAs used to pin GitHub Actions to an immutable
# revision (a security best practice). They are public, non-secret identifiers.

name: ci
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8f4b7f84864484a7bf31766abe9204da3cbe65b3   # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
      - uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcd730a51f2d6
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
